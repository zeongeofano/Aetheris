<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aetheris AI | Intelligent Assistant</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-black: #08090a;
            --card-bg: rgba(18, 19, 20, 0.8);
            --accent: #ffffff;
            --text-dim: #9ca3af;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: var(--bg-black);
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: white;
            overflow: hidden;
        }

        /* SPLASH SCREEN */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-black);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            animation: fadeOutSplash 0.6s ease-in-out 2.2s forwards;
        }

        .splash-loader {
            width: 35px; height: 35px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeOutSplash { to { opacity: 0; visibility: hidden; } }

        /* HEADER */
        header {
            padding: env(safe-area-inset-top) 20px 20px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(8, 9, 10, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        header h1 {
            font-size: 0.85rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.9;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #10b981;
            text-transform: uppercase;
        }

        .status-dot {
            width: 6px; height: 6px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 8px #10b981;
        }

        /* CHAT AREA */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 100px 20px 140px 20px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .message {
            max-width: 85%;
            font-size: 0.95rem;
            line-height: 1.6;
            animation: messageFade 0.4s ease-out;
        }

        @keyframes messageFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user-message {
            align-self: flex-end;
            background: var(--accent);
            color: black;
            padding: 12px 18px;
            border-radius: 20px 20px 4px 20px;
            font-weight: 500;
        }

        .ai-message {
            align-self: flex-start;
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 15px 18px;
            border-radius: 20px 20px 20px 4px;
            color: #efefef;
        }

        /* INPUT BAR */
        .bottom-nav {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 650px;
            z-index: 1000;
        }

        .input-wrapper {
            background: rgba(28, 29, 30, 0.95);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 8px 10px 8px 20px;
            display: flex;
            align-items: center;
            box-shadow: 0 15px 45px rgba(0,0,0,0.5);
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            outline: none;
            font-size: 0.95rem;
            padding: 10px 0;
            resize: none;
            max-height: 120px;
            min-height: 24px;
        }

        .action-group {
            display: flex;
            gap: 4px;
        }

        .icon-btn {
            background: transparent;
            border: none;
            width: 40px; height: 40px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-dim);
            cursor: pointer;
            transition: 0.2s;
        }

        .send-btn { background: white !important; color: black !important; }
        .send-btn:hover { transform: scale(1.05); }

        #chat-container::-webkit-scrollbar { width: 4px; }
        #chat-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-loader"></div>
    </div>

    <header>
        <h1>Aetheris</h1>
        <div class="status-badge">
            <div class="status-dot"></div>
            System Active
        </div>
    </header>

    <div id="chat-container">
        <div class="message ai-message">
            Selamat datang. Saya **Aetheris**, asisten cerdas yang dirancang untuk membantu Anda. Apa yang bisa kita kerjakan bersama hari ini?
        </div>
    </div>

    <div class="bottom-nav">
        <div class="input-wrapper">
            <textarea id="user-input" placeholder="Tulis pesan..." rows="1"></textarea>
            <div class="action-group">
                <button class="icon-btn" onclick="startVoice()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path></svg>
                </button>
                <button class="icon-btn send-btn" onclick="sendMessage()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');

        function autoResize() {
            this.style.height = 'auto';
            this.style.height = this.scrollHeight + 'px';
        }
        userInput.addEventListener('input', autoResize);

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, 'user-message');
            userInput.value = '';
            userInput.style.height = 'auto';

            const loading = document.createElement('div');
            loading.className = 'message ai-message';
            loading.innerText = 'Analysing...';
            chatContainer.appendChild(loading);
            scrollToBottom();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: text })
                });
                const data = await response.json();
                chatContainer.removeChild(loading);
                appendMessage(data.text, 'ai-message');
            } catch (e) {
                chatContainer.removeChild(loading);
                appendMessage("Terjadi kendala saat memproses permintaan Anda.", 'ai-message');
            }
        }

        function appendMessage(text, className) {
            const div = document.createElement('div');
            div.className = `message ${className}`;
            div.innerHTML = className === 'ai-message' ? marked.parse(text) : text;
            chatContainer.appendChild(div);
            scrollToBottom();
        }

        function scrollToBottom() {
            chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
        }
    </script>
</body>
</html>
