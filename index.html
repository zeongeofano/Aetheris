<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aetheris AI - Zeon Geofano</title>
    <style>
        :root {
            --bg-color: #0b0b0d;
            --ai-bubble: rgba(255, 255, 255, 0.07);
            --user-bubble: rgba(0, 242, 255, 0.15);
            --accent: #00f2ff;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .bubble {
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.6;
            backdrop-filter: blur(10px);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user-bubble {
            align-self: flex-end;
            background: var(--user-bubble);
            border: 1px solid rgba(0, 242, 255, 0.3);
            border-bottom-right-radius: 4px;
        }

        .ai-bubble {
            align-self: flex-start;
            background: var(--ai-bubble);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom-left-radius: 4px;
        }

        .input-area {
            padding: 20px;
            background: rgba(15, 15, 18, 0.9);
            border-top: 1px solid #222;
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px 20px;
            border-radius: 30px;
            border: 1px solid #333;
            background: #16161a;
            color: white;
            outline: none;
        }

        button {
            background: var(--accent);
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
        }
    </style>
</head>
<body>
    <div id="chat-container"></div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Tanya Aetheris..." onkeypress="if(event.key==='Enter')sendChat()">
        <button onclick="sendChat()">➤</button>
    </div>

    <script>
        async function sendChat() {
            const input = document.getElementById('user-input');
            const container = document.getElementById('chat-container');
            if (!input.value.trim()) return;

            const text = input.value;
            container.innerHTML += `<div class="bubble user-bubble">${text}</div>`;
            input.value = '';
            container.scrollTop = container.scrollHeight;

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: text })
                });
                const data = await res.json();
                container.innerHTML += `<div class="bubble ai-bubble">${data.text}</div>`;
            } catch {
                container.innerHTML += `<div class="bubble ai-bubble">Error koneksi.</div>`;
            }
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>
</html>
