<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aetheris AI</title>
    <style>
        :root {
            --primary-glow: #00d2ff;
            --secondary-glow: #3a7bd5;
            --bg-dark: #0f172a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: white;
            overflow: hidden;
        }

        /* Header */
        header {
            padding: 15px;
            text-align: center;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
        }

        header h1 {
            font-size: 1.2rem;
            background: linear-gradient(to right, var(--primary-glow), var(--secondary-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        /* Chat Area */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.5;
            font-size: 0.95rem;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            align-self: flex-end;
            background: rgba(58, 123, 213, 0.3);
            border: 1px solid rgba(58, 123, 213, 0.5);
            border-bottom-right-radius: 4px;
        }

        .ai-message {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom-left-radius: 4px;
            backdrop-filter: blur(5px);
        }

        /* Input Area (Nempel di Bawah) */
        .input-wrapper {
            padding: 15px 15px 30px 15px; /* Extra padding bawah untuk kenyamanan HP */
            background: linear-gradient(transparent, var(--bg-dark) 20%);
            position: relative;
        }

        .input-container {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 5px 5px 5px 15px;
            backdrop-filter: blur(15px);
            transition: border 0.3s;
        }

        .input-container:focus-within {
            border-color: var(--primary-glow);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 10px 0;
            outline: none;
            font-size: 1rem;
        }

        button {
            background: var(--primary-glow);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            color: black;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        button:active {
            transform: scale(0.9);
        }

        /* Loading Dots */
        .typing {
            font-style: italic;
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>AETHERIS AI</h1>
    </header>

    <div id="chat-container">
        <div class="message ai-message">Halo! Saya Aetheris. Ada yang bisa saya bantu hari ini?</div>
    </div>

    <div class="input-wrapper">
        <div id="loading" class="typing">Aetheris sedang berpikir...</div>
        <div class="input-container">
            <input type="text" id="user-input" placeholder="Tanyakan sesuatu..." onkeypress="if(event.key === 'Enter') sendMessage()">
            <button onclick="sendMessage()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const inputElement = document.getElementById('user-input');
            const chatContainer = document.getElementById('chat-container');
            const loading = document.getElementById('loading');
            const message = inputElement.value.trim();

            if (!message) return;

            // Tambah pesan user ke UI
            addMessage(message, 'user-message');
            inputElement.value = '';
            
            // Tampilkan loading
            loading.style.display = 'block';
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: message })
                });

                const data = await response.json();
                addMessage(data.text, 'ai-message');
            } catch (error) {
                addMessage("Maaf, ada kendala koneksi. Coba lagi ya!", 'ai-message');
            } finally {
                loading.style.display = 'none';
            }
        }

        function addMessage(text, className) {
            const chatContainer = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = `message ${className}`;
            div.innerText = text;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
    </script>
</body>
    </html>
