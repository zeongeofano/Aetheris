<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aetheris AI | Forge Future</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary-glow: #00d2ff;
            --secondary-glow: #3a7bd5;
            --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.07);
            --border: rgba(255, 255, 255, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', -apple-system, sans-serif; }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: white;
            overflow: hidden;
        }

        header {
            padding: 15px;
            text-align: center;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
            z-index: 10;
        }

        header h1 {
            font-size: 1rem;
            letter-spacing: 2px;
            background: linear-gradient(to right, var(--primary-glow), var(--secondary-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            text-transform: uppercase;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        @keyframes smoothAppear {
            from { opacity: 0; transform: translateY(20px) scale(0.95); filter: blur(10px); }
            to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        .message {
            max-width: 85%;
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.6;
            position: relative;
            animation: smoothAppear 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            word-wrap: break-word;
        }

        .user-message {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--secondary-glow), #00d2ff);
            border-bottom-right-radius: 4px;
        }

        .ai-message {
            align-self: flex-start;
            background: var(--glass);
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
            border-bottom-left-radius: 4px;
            padding-right: 45px;
        }

        .gemini-star {
            width: 22px; height: 22px;
            color: var(--primary-glow);
            position: absolute; top: 12px; right: 12px;
        }

        .gemini-star.thinking { animation: spin-glow 1.5s infinite linear; }
        @keyframes spin-glow { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .bottom-nav {
            padding: 15px;
            background: linear-gradient(transparent, var(--bg-dark) 40%);
        }

        .input-box {
            display: flex;
            align-items: flex-end;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 8px 8px 8px 18px;
            backdrop-filter: blur(20px);
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            outline: none;
            font-size: 1rem;
            padding: 8px 0;
            resize: none;
            max-height: 150px;
            min-height: 24px;
        }

        .icon-btn {
            background: transparent;
            border: none;
            width: 40px; height: 40px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; margin-left: 5px;
            transition: all 0.2s;
            color: white;
        }

        .send-btn { background: var(--primary-glow); color: black; }
        .mic-btn.active { color: #ff4b2b; animation: pulse 1s infinite; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        #chat-container::-webkit-scrollbar { width: 4px; }
        #chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

    <header>
        <h1>Aetheris • Forge Future</h1>
    </header>

    <div id="chat-container">
        <div class="message ai-message">
            <svg class="gemini-star" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L14.85 8.65L21.5 11.5L14.85 14.35L12 21L9.15 14.35L2.5 11.5L9.15 8.65L12 2Z" /></svg>
            <span>Halo Zeon! Fitur suara sudah aktif. Tekan mikrofon untuk bicara!</span>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="input-box">
            <textarea id="user-input" placeholder="Tulis pesan..." rows="1" autocomplete="off"></textarea>
            
            <button class="icon-btn mic-btn" id="mic-btn" onclick="startVoice()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
            </button>

            <button class="icon-btn send-btn" onclick="sendMessage()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const micBtn = document.getElementById('mic-btn');

        // FUNGSI SUARA (Voice to Text)
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'id-ID'; // Bahasa Indonesia
            recognition.interimResults = false;

            recognition.onstart = () => {
                micBtn.classList.add('active');
                userInput.placeholder = "Mendengarkan...";
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                userInput.value = transcript;
                userInput.style.height = (userInput.scrollHeight) + 'px';
            };

            recognition.onend = () => {
                micBtn.classList.remove('active');
                userInput.placeholder = "Tulis pesan...";
            };

            function startVoice() {
                recognition.start();
            }
        } else {
            document.getElementById('mic-btn').style.display = 'none';
        }

        // Auto-resize textarea
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        // Enter to send
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        const starSvg = (isThinking) => `
            <svg class="gemini-star ${isThinking ? 'thinking' : ''}" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2L14.85 8.65L21.5 11.5L14.85 14.35L12 21L9.15 14.35L2.5 11.5L9.15 8.65L12 2Z" />
            </svg>
        `;

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, 'user-message');
            userInput.value = '';
            userInput.style.height = 'auto';

            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message ai-message';
            loadingDiv.innerHTML = starSvg(true) + `<span>Aetheris sedang memproses...</span>`;
            chatContainer.appendChild(loadingDiv);
            scrollToBottom();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: text })
                });
                const data = await response.json();

                chatContainer.removeChild(loadingDiv);
                appendMessage(data.text, 'ai-message');
            } catch (error) {
                chatContainer.removeChild(loadingDiv);
                appendMessage("Gagal terhubung. Coba lagi.", 'ai-message');
            }
        }

        function appendMessage(text, className) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${className}`;
            if (className === 'ai-message') {
                msgDiv.innerHTML = starSvg(false) + `<div>${marked.parse(text)}</div>`;
            } else {
                msgDiv.innerText = text;
            }
            chatContainer.appendChild(msgDiv);
            scrollToBottom();
        }

        function scrollToBottom() {
            chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
        }
    </script>
</body>
</html>
