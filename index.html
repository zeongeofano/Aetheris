<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aetheris AI | Forge Future</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary-glow: #00d2ff;
            --secondary-glow: #3a7bd5;
            --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.07);
            --border: rgba(255, 255, 255, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: white;
            overflow: hidden;
        }

        header {
            padding: 15px;
            text-align: center;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
            z-index: 10;
        }

        header h1 {
            font-size: 1rem;
            letter-spacing: 2px;
            background: linear-gradient(to right, var(--primary-glow), var(--secondary-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Bubble Chat Style */
        .message {
            max-width: 85%;
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.6;
            position: relative;
            animation: slideUp 0.3s ease-out;
        }

        /* Styling teks di dalam Markdown */
        .message p { margin-bottom: 8px; }
        .message ul, .message ol { margin-left: 20px; margin-bottom: 8px; }
        .message code { background: rgba(0,0,0,0.3); padding: 2px 5px; border-radius: 4px; font-family: monospace; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user-message {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--secondary-glow), #00d2ff);
            border-bottom-right-radius: 4px;
        }

        .ai-message {
            align-self: flex-start;
            background: var(--glass);
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
            border-bottom-left-radius: 4px;
            padding-right: 40px;
        }

        .gemini-star {
            width: 20px; height: 20px;
            color: var(--primary-glow);
            position: absolute; top: 12px; right: 12px;
        }

        .gemini-star.thinking { animation: spin 1.5s infinite linear; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Input Area Modern */
        .bottom-nav {
            padding: 15px;
            background: linear-gradient(transparent, var(--bg-dark) 40%);
        }

        .input-box {
            display: flex;
            align-items: flex-end; /* Supaya tombol kirim tetap di bawah saat input meninggi */
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 8px 8px 8px 18px;
            backdrop-filter: blur(20px);
        }

        /* Textarea agar bisa auto-resize */
        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            outline: none;
            font-size: 1rem;
            padding: 8px 0;
            resize: none;
            max-height: 150px;
            min-height: 24px;
        }

        button {
            background: var(--primary-glow);
            border: none;
            width: 40px; height: 40px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; margin-left: 8px;
        }

        #chat-container::-webkit-scrollbar { width: 4px; }
        #chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

    <header>
        <h1>AETHERIS • FORGE FUTURE</h1>
    </header>

    <div id="chat-container">
        <div class="message ai-message">
            <svg class="gemini-star" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L14.85 8.65L21.5 11.5L14.85 14.35L12 21L9.15 14.35L2.5 11.5L9.15 8.65L12 2Z" /></svg>
            <span>Halo Zeon! Saya Aetheris. Ada yang bisa kita bangun hari ini?</span>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="input-box">
            <textarea id="user-input" placeholder="Tulis pesan..." rows="1" autocomplete="off"></textarea>
            <button onclick="sendMessage()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');

        // Fungsi Auto-Resize Textarea
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        // Kirim pakai Enter (tapi Shift+Enter buat baris baru)
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        const starSvg = (isThinking) => `
            <svg class="gemini-star ${isThinking ? 'thinking' : ''}" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2L14.85 8.65L21.5 11.5L14.85 14.35L12 21L9.15 14.35L2.5 11.5L9.15 8.65L12 2Z" />
            </svg>
        `;

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, 'user-message');
            userInput.value = '';
            userInput.style.height = 'auto'; // Reset tinggi box

            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message ai-message';
            loadingDiv.innerHTML = starSvg(true) + `<span>Aetheris sedang memproses...</span>`;
            chatContainer.appendChild(loadingDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: text })
                });
                const data = await response.json();

                chatContainer.removeChild(loadingDiv);
                appendMessage(data.text, 'ai-message');
            } catch (error) {
                chatContainer.removeChild(loadingDiv);
                appendMessage("Gagal terhubung ke Forge Future. Coba lagi.", 'ai-message');
            }
        }

        function appendMessage(text, className) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${className}`;
            
            if (className === 'ai-message') {
                // Menggunakan marked.parse agar teks rapi (Markdown)
                msgDiv.innerHTML = starSvg(false) + `<div>${marked.parse(text)}</div>`;
            } else {
                msgDiv.innerText = text;
            }
            
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
    </script>
</body>
    </html>
