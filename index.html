<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aetheris AI | Forge Future</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-black: #08090a;
            --card-bg: rgba(22, 23, 24, 0.8);
            --accent: #ffffff;
            --text-dim: #9ca3af;
            --border: rgba(255, 255, 255, 0.08);
            --aetheris-gradient: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: var(--bg-black);
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: white;
            overflow: hidden;
        }

        /* --- SPLASH SCREEN LOGO COLORING --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-black);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
            animation: fadeOutSplash 0.8s ease-in-out 3.2s forwards;
        }

        .aetheris-logo-svg {
            width: 80px; height: 80px;
            stroke: #ffffff; stroke-width: 1.2; fill: none;
            stroke-dasharray: 100; stroke-dashoffset: 100;
            animation: logoColoring 3s ease-in-out forwards;
        }

        @keyframes logoColoring {
            0% { stroke-dashoffset: 100; stroke: #fff; }
            40% { stroke-dashoffset: 0; stroke: #00d2ff; filter: drop-shadow(0 0 15px #00d2ff); }
            70% { stroke: #3a7bd5; filter: drop-shadow(0 0 20px #3a7bd5); }
            100% { stroke-dashoffset: 0; stroke: #fff; fill: rgba(255,255,255,0.05); }
        }

        @keyframes fadeOutSplash { to { opacity: 0; visibility: hidden; } }

        /* --- HEADER & SIDEBAR --- */
        header {
            padding: env(safe-area-inset-top) 20px 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(8, 9, 10, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
            z-index: 100;
        }

        .menu-btn {
            background: transparent; border: none; color: white; cursor: pointer;
            display: flex; align-items: center;
        }

        .upgrade-btn {
            background: var(--aetheris-gradient);
            border: none; color: white;
            padding: 6px 14px; border-radius: 20px;
            font-size: 0.75rem; font-weight: 800;
            cursor: pointer; transition: 0.3s;
        }

        .upgrade-btn:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(0, 210, 255, 0.4); }

        /* --- CHAT AREA --- */
        #chat-container {
            flex: 1; overflow-y: auto;
            padding: 100px 20px 180px 20px;
            display: flex; flex-direction: column; gap: 24px;
        }

        .message { max-width: 85%; font-size: 0.95rem; line-height: 1.6; animation: messageFade 0.4s ease-out; }
        .message strong, .message b { font-weight: 800; color: #ffffff; }

        @keyframes messageFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user-message {
            align-self: flex-end; background: var(--accent); color: black;
            padding: 12px 18px; border-radius: 20px 20px 4px 20px; font-weight: 600;
        }

        .ai-message {
            align-self: flex-start; background: var(--card-bg);
            border: 1px solid var(--border); padding: 15px 18px;
            border-radius: 20px 20px 20px 4px; color: #efefef;
        }

        /* --- TYPING INDICATOR --- */
        #typing-indicator {
            position: fixed; bottom: 105px; left: 50%;
            transform: translateX(-50%); display: none;
            align-items: center; gap: 10px; z-index: 900;
        }

        .typing-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--aetheris-gradient);
            animation: typingDotPulse 1.4s infinite ease-in-out;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        .typing-text {
            font-size: 0.75rem; font-weight: 700; letter-spacing: 1px;
            background: var(--aetheris-gradient);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        @keyframes typingDotPulse {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* --- INPUT BAR --- */
        .bottom-nav {
            position: fixed; bottom: 25px; left: 50%;
            transform: translateX(-50%); width: 92%; max-width: 650px; z-index: 1000;
        }

        .input-wrapper {
            background: rgba(28, 29, 30, 0.95); backdrop-filter: blur(25px);
            border: 1px solid var(--border); border-radius: 24px;
            padding: 8px 10px 8px 20px; display: flex; align-items: center;
        }

        textarea {
            flex: 1; background: transparent; border: none; color: white;
            outline: none; font-size: 0.95rem; padding: 10px 0;
            resize: none; max-height: 120px; min-height: 24px;
        }

        .send-btn { background: white !important; color: black !important; width: 40px; height: 40px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-left: 8px;}

        #chat-container::-webkit-scrollbar { width: 4px; }
        #chat-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.05); }
    </style>
</head>
<body>

    <div id="splash-screen">
        <svg class="aetheris-logo-svg" viewBox="0 0 24 24">
            <path d="M12 2L14.85 8.65L21.5 11.5L14.85 14.35L12 21L9.15 14.35L2.5 11.5L9.15 8.65L12 2Z" />
        </svg>
    </div>

    <header>
        <button class="menu-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
        <h1>Aetheris</h1>
        <button class="upgrade-btn" onclick="alert('Upgrade ke Plus untuk fitur lebih canggih!')">Upgrade to Plus</button>
    </header>

    <div id="chat-container">
        <div class="message ai-message">
            Selamat datang di **Aetheris**. Asisten cerdas Anda siap membantu. Gunakan fitur **Plus** untuk akses tanpa batas.
        </div>
    </div>

    <div id="typing-indicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <span class="typing-text">Aetheris is Analysing</span>
    </div>

    <div class="bottom-nav">
        <div class="input-wrapper">
            <textarea id="user-input" placeholder="Kirim pesan..." rows="1" autocomplete="off"></textarea>
            <button class="send-btn" onclick="sendMessage()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const typingIndicator = document.getElementById('typing-indicator');

        // Pastikan Markdown bekerja untuk teks tebal
        marked.setOptions({ breaks: true, gfm: true });

        function autoResize() {
            this.style.height = 'auto';
            this.style.height = this.scrollHeight + 'px';
        }
        userInput.addEventListener('input', autoResize);

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, 'user-message');
            userInput.value = '';
            userInput.style.height = 'auto';

            typingIndicator.style.display = 'flex';
            scrollToBottom();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: text })
                });
                const data = await response.json();
                typingIndicator.style.display = 'none';
                appendMessage(data.text, 'ai-message');
            } catch (e) {
                typingIndicator.style.display = 'none';
                appendMessage("Terjadi kesalahan koneksi.", 'ai-message');
            }
        }

        function appendMessage(text, className) {
            const div = document.createElement('div');
            div.className = `message ${className}`;
            div.innerHTML = className === 'ai-message' ? marked.parse(text) : text;
            chatContainer.appendChild(div);
            scrollToBottom();
        }

        function scrollToBottom() {
            chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
        }
    </script>
</body>
        </html>
