<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aetheris AI</title>
    <style>
        :root {
            --primary-glow: #00d2ff;
            --secondary-glow: #3a7bd5;
            --bg-dark: #0f172a;
            --glass: rgba(255, 255, 255, 0.07);
            --border: rgba(255, 255, 255, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: white;
            overflow: hidden;
        }

        /* Header Premium */
        header {
            padding: 15px;
            text-align: center;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
            z-index: 10;
        }

        header h1 {
            font-size: 1.1rem;
            letter-spacing: 2px;
            background: linear-gradient(to right, var(--primary-glow), var(--secondary-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
            text-transform: uppercase;
        }

        /* Area Chat (Scrollable) */
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 20px;
        }

        /* Bubble Chat */
        .message {
            max-width: 85%;
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.5;
            animation: slideUp 0.3s ease-out;
            word-wrap: break-word;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--secondary-glow), #00d2ff);
            color: white;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.2);
        }

        .ai-message {
            align-self: flex-start;
            background: var(--glass);
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
            border-bottom-left-radius: 4px;
        }

        /* Loading Bintang Gemini */
        .typing-area {
            padding: 0 20px;
            height: 30px;
            display: none; /* Muncul saat kirim pesan */
            align-items: center;
            gap: 8px;
            color: var(--primary-glow);
            font-size: 0.85rem;
            font-weight: 500;
        }

        .gemini-star {
            width: 18px;
            height: 18px;
            animation: rotate-pulse 1.5s infinite linear;
        }

        @keyframes rotate-pulse {
            0% { transform: scale(0.8) rotate(0deg); opacity: 0.6; }
            50% { transform: scale(1.1) rotate(90deg); opacity: 1; filter: drop-shadow(0 0 5px var(--primary-glow)); }
            100% { transform: scale(0.8) rotate(180deg); opacity: 0.6; }
        }

        /* Input Bar (Sticky di Bawah) */
        .bottom-nav {
            padding: 15px;
            background: linear-gradient(transparent, var(--bg-dark) 40%);
            border-top: 1px solid var(--border);
        }

        .input-box {
            display: flex;
            align-items: center;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 6px 6px 6px 20px;
            backdrop-filter: blur(20px);
            transition: all 0.3s ease;
        }

        .input-box:focus-within {
            border-color: var(--primary-glow);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.1);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            outline: none;
            font-size: 1rem;
            padding: 10px 0;
        }

        button {
            background: var(--primary-glow);
            color: #000;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:active {
            transform: scale(0.9);
        }

        /* Scrollbar Halus */
        #chat-container::-webkit-scrollbar {
            width: 4px;
        }
        #chat-container::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Aetheris AI</h1>
    </header>

    <div id="chat-container">
        <div class="message ai-message">Halo Zeon! Saya Aetheris. Ada yang bisa saya bantu hari ini?</div>
    </div>

    <div class="typing-area" id="loading-indicator">
        <svg class="gemini-star" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2L14.85 8.65L21.5 11.5L14.85 14.35L12 21L9.15 14.35L2.5 11.5L9.15 8.65L12 2Z" />
        </svg>
        <span>Aetheris sedang berpikir...</span>
    </div>

    <div class="bottom-nav">
        <div class="input-box">
            <input type="text" id="user-input" placeholder="Tanyakan sesuatu..." autocomplete="off" onkeypress="if(event.key === 'Enter') sendMessage()">
            <button onclick="sendMessage()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const loadingIndicator = document.getElementById('loading-indicator');

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // 1. Tampilkan pesan user
            appendMessage(text, 'user-message');
            userInput.value = '';

            // 2. Tampilkan indikator loading (Bintang berputar)
            loadingIndicator.style.display = 'flex';
            scrollToBottom();

            try {
                // 3. Panggil API ke Backend Vercel
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: text })
                });

                const data = await response.json();

                // 4. Tampilkan balasan AI
                appendMessage(data.text, 'ai-message');
            } catch (error) {
                appendMessage("Maaf, sepertinya ada gangguan koneksi. Coba lagi ya!", 'ai-message');
            } finally {
                // 5. Sembunyikan loading
                loadingIndicator.style.display = 'none';
                scrollToBottom();
            }
        }

        function appendMessage(text, className) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${className}`;
            msgDiv.innerText = text;
            chatContainer.appendChild(msgDiv);
            scrollToBottom();
        }

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
    </script>
</body>
                    </html>
