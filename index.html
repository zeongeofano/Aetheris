<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aetheris AI | Forge Future</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-black: #050607;
            --card-bg: rgba(22, 24, 28, 0.7);
            --accent: #ffffff;
            --text-dim: #9ca3af;
            --border: rgba(255, 255, 255, 0.08);
            --aetheris-gradient: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; }

        body {
            background-color: var(--bg-black);
            height: 100vh; display: flex; flex-direction: column; color: white; overflow: hidden;
            position: relative;
        }

        /* EFEK BACKGROUND AURA */
        body::before {
            content: ""; position: absolute; top: -10%; left: -10%; width: 40%; height: 40%;
            background: radial-gradient(circle, rgba(0, 210, 255, 0.05) 0%, transparent 70%);
            z-index: -1; pointer-events: none;
        }

        /* SPLASH SCREEN */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-black); display: flex; justify-content: center; align-items: center;
            z-index: 9999; animation: fadeOutSplash 0.8s ease-in-out 3s forwards;
        }

        .aetheris-logo-svg {
            width: 80px; height: 80px; stroke: #fff; stroke-width: 1.2; fill: none;
            stroke-dasharray: 100; stroke-dashoffset: 100;
            animation: logoColoring 2.5s ease-in-out forwards;
        }

        @keyframes logoColoring {
            0% { stroke-dashoffset: 100; stroke: #fff; }
            50% { stroke-dashoffset: 0; stroke: #00d2ff; filter: drop-shadow(0 0 15px #00d2ff); }
            100% { stroke-dashoffset: 0; stroke: #fff; fill: rgba(255,255,255,0.1); }
        }

        @keyframes fadeOutSplash { to { opacity: 0; visibility: hidden; } }

        /* HEADER */
        header {
            padding: env(safe-area-inset-top) 20px 15px 20px;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(8, 9, 10, 0.6); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); z-index: 100;
        }

        .icon-btn { background: transparent; border: none; color: white; cursor: pointer; transition: 0.2s; }
        .icon-btn:active { transform: scale(0.9); }

        .upgrade-btn {
            background: var(--aetheris-gradient); border: none; color: white;
            padding: 8px 16px; border-radius: 20px; font-size: 0.75rem; font-weight: 800;
            cursor: pointer; transition: 0.3s;
        }

        /* SIDEBAR GLASSMORPHISM */
        #sidebar {
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
            background: rgba(15, 17, 20, 0.8); backdrop-filter: blur(30px);
            border-right: 1px solid var(--border); z-index: 2000;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 60px 20px;
        }

        #sidebar.open { left: 0; }
        .sidebar-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; z-index: 1999;
        }

        /* CHAT AREA */
        #chat-container {
            flex: 1; overflow-y: auto; padding: 100px 20px 180px 20px;
            display: flex; flex-direction: column; gap: 24px; scroll-behavior: smooth;
        }

        .message { max-width: 85%; font-size: 0.95rem; line-height: 1.6; position: relative; animation: messageFade 0.4s ease-out; }
        .message strong { font-weight: 800; color: #fff; }

        .user-message {
            align-self: flex-end; background: var(--accent); color: black;
            padding: 12px 18px; border-radius: 20px 20px 4px 20px; font-weight: 600;
        }

        .ai-message {
            align-self: flex-start; background: var(--card-bg); border: 1px solid var(--border);
            padding: 15px 18px; border-radius: 20px 20px 20px 4px; color: #efefef;
        }

        /* COPY BUTTON */
        .copy-btn {
            position: absolute; bottom: -25px; left: 5px; font-size: 0.7rem;
            color: var(--text-dim); cursor: pointer; display: flex; align-items: center; gap: 4px;
        }

        /* SUGGESTION CHIPS */
        #suggestions { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
        .chip {
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            padding: 8px 14px; border-radius: 15px; font-size: 0.8rem; cursor: pointer;
            transition: 0.2s;
        }
        .chip:hover { background: rgba(255,255,255,0.1); }

        /* TYPING INDICATOR */
        #typing-indicator {
            position: fixed; bottom: 105px; left: 50%; transform: translateX(-50%);
            display: none; align-items: center; gap: 10px; z-index: 900;
        }
        .typing-dot {
            width: 6px; height: 6px; border-radius: 50%; background: var(--aetheris-gradient);
            animation: typingDotPulse 1.4s infinite ease-in-out;
        }

        @keyframes typingDotPulse { 0%, 100% { transform: scale(0.6); opacity: 0.5; } 50% { transform: scale(1); opacity: 1; } }

        /* INPUT BAR */
        .bottom-nav {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            width: 92%; max-width: 650px; z-index: 1000;
        }

        .input-wrapper {
            background: rgba(28, 30, 32, 0.9); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 24px;
            padding: 8px 10px 8px 20px; display: flex; align-items: center;
        }

        textarea {
            flex: 1; background: transparent; border: none; color: white;
            outline: none; font-size: 0.95rem; padding: 10px 0; resize: none; max-height: 120px;
        }

        .send-btn {
            background: white !important; color: black !important; width: 40px; height: 40px;
            border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <svg class="aetheris-logo-svg" viewBox="0 0 24 24">
            <path d="M12 2L14.85 8.65L21.5 11.5L14.85 14.35L12 21L9.15 14.35L2.5 11.5L9.15 8.65L12 2Z" />
        </svg>
    </div>

    <div class="sidebar-overlay" id="overlay" onclick="toggleSidebar()"></div>
    <div id="sidebar">
        <h2 style="font-size: 1.2rem; margin-bottom: 30px;">Menu</h2>
        <p style="color: var(--text-dim); font-size: 0.9rem; margin-bottom: 20px; cursor: pointer;">History Chat</p>
        <p style="color: var(--text-dim); font-size: 0.9rem; margin-bottom: 20px; cursor: pointer;">Settings</p>
        <hr style="border: 0; border-top: 1px solid var(--border); margin-bottom: 20px;">
        <p style="color: #00d2ff; font-size: 0.9rem; font-weight: 800; cursor: pointer;">Forge Future Profile</p>
    </div>

    <header>
        <button class="icon-btn" onclick="toggleSidebar()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
        <h1 style="letter-spacing: 2px;">AETHERIS</h1>
        <button class="upgrade-btn" onclick="alert('Upgrade to Plus Feature')">Plus</button>
    </header>

    <div id="chat-container">
        <div class="message ai-message">
            Selamat datang di **Aetheris**. Apa yang bisa saya bantu hari ini?
            <div id="suggestions">
                <div class="chip" onclick="quickChat('Apa itu Forge Future?')">Forge Future?</div>
                <div class="chip" onclick="quickChat('Analisis Market XAUUSD')">Market Gold</div>
                <div class="chip" onclick="quickChat('Buatkan kode Python')">Python Code</div>
            </div>
        </div>
    </div>

    <div id="typing-indicator">
        <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
        <span style="font-size: 0.7rem; font-weight: 800; margin-left: 5px; color: #00d2ff;">ANALYSING...</span>
    </div>

    <div class="bottom-nav">
        <div class="input-wrapper">
            <textarea id="user-input" placeholder="Tanya Aetheris..." rows="1" autocomplete="off"></textarea>
            <button class="send-btn" onclick="sendMessage()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const typingIndicator = document.getElementById('typing-indicator');

        marked.setOptions({ breaks: true, gfm: true });

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const ov = document.getElementById('overlay');
            sb.classList.toggle('open');
            ov.style.display = sb.classList.contains('open') ? 'block' : 'none';
        }

        function quickChat(text) {
            userInput.value = text;
            sendMessage();
            document.getElementById('suggestions').style.display = 'none';
        }

        function copyText(btn, text) {
            navigator.clipboard.writeText(text);
            btn.innerText = "✓ Copied";
            setTimeout(() => btn.innerText = "Copy text", 2000);
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, 'user-message');
            userInput.value = '';
            userInput.style.height = 'auto';
            typingIndicator.style.display = 'flex';
            scrollToBottom();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: text })
                });
                const data = await response.json();
                typingIndicator.style.display = 'none';
                appendMessage(data.text, 'ai-message');
            } catch (e) {
                typingIndicator.style.display = 'none';
                appendMessage("Koneksi bermasalah.", 'ai-message');
            }
        }

        function appendMessage(text, className) {
            const div = document.createElement('div');
            div.className = `message ${className}`;
            if (className === 'ai-message') {
                div.innerHTML = marked.parse(text) + `<div class="copy-btn" onclick="copyText(this, \`${text.replace(/`/g, '\\`')}\`)">Copy text</div>`;
            } else {
                div.innerText = text;
            }
            chatContainer.appendChild(div);
            scrollToBottom();
        }

        function scrollToBottom() {
            chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
        }

        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = this.scrollHeight + 'px';
        });
    </script>
</body>
</html>
