<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aetheris AI | Forge Future</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary-glow: #00d2ff;
            --bg-dark: #0f172a;
            --gemini-surface: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 50%, #1e293b 0%, #0f172a 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            color: white;
            overflow: hidden;
        }

        header {
            padding: 15px;
            text-align: center;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            z-index: 10;
        }

        header h1 {
            font-size: 0.9rem;
            letter-spacing: 3px;
            color: var(--primary-glow);
            font-weight: 800;
            text-transform: uppercase;
        }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        /* Message Bubbles */
        .message {
            max-width: 85%;
            padding: 14px 18px;
            border-radius: 22px;
            font-size: 0.95rem;
            line-height: 1.6;
            position: relative;
            animation: smoothAppear 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes smoothAppear {
            from { opacity: 0; transform: translateY(15px); filter: blur(5px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        .user-message {
            align-self: flex-end;
            background: #2563eb;
            color: white;
            border-bottom-right-radius: 5px;
        }

        .ai-message {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
            border-bottom-left-radius: 5px;
            padding-right: 45px;
        }

        .gemini-star {
            width: 20px; height: 20px;
            color: var(--primary-glow);
            position: absolute; top: 12px; right: 12px;
        }

        .gemini-star.thinking { animation: spin 2s infinite ease-in-out; }
        @keyframes spin { 
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(180deg) scale(1.2); }
            100% { transform: rotate(360deg) scale(1); }
        }

        /* BAR INPUT MIRIP GEMINI */
        .bottom-nav {
            padding: 15px 20px 25px 20px; /* Jarak dari bawah layar */
            background: transparent;
        }

        .input-wrapper {
            max-width: 600px;
            margin: 0 auto;
            background: var(--gemini-surface);
            backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-radius: 32px; /* Lebih bulat khas Gemini */
            padding: 8px 12px 8px 20px;
            display: flex;
            align-items: flex-end;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: border-color 0.3s;
        }

        .input-wrapper:focus-within {
            border-color: rgba(0, 210, 255, 0.5);
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            outline: none;
            font-size: 1rem;
            padding: 10px 0;
            resize: none;
            max-height: 150px;
            min-height: 24px;
            line-height: 1.5;
        }

        .action-btns {
            display: flex;
            gap: 5px;
            margin-bottom: 3px;
        }

        .icon-btn {
            background: transparent;
            border: none;
            width: 42px; height: 42px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            color: #94a3b8;
            transition: all 0.2s;
        }

        .icon-btn:hover { background: rgba(255, 255, 255, 0.1); color: white; }
        .send-btn { color: var(--primary-glow); }
        .mic-btn.active { color: #ef4444; animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        #chat-container::-webkit-scrollbar { width: 4px; }
        #chat-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>

    <header>
        <h1>Aetheris • Forge Future</h1>
    </header>

    <div id="chat-container">
        <div class="message ai-message">
            <svg class="gemini-star" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L14.85 8.65L21.5 11.5L14.85 14.35L12 21L9.15 14.35L2.5 11.5L9.15 8.65L12 2Z" /></svg>
            <div style="font-size: 0.9rem;">Halo Zeon! Saya Aetheris. Apa yang ingin kamu kembangkan di Forge Future hari ini?</div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="input-wrapper">
            <textarea id="user-input" placeholder="Ketik pesan di sini..." rows="1"></textarea>
            
            <div class="action-btns">
                <button class="icon-btn mic-btn" id="mic-btn" onclick="startVoice()" title="Gunakan Suara">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                </button>

                <button class="icon-btn send-btn" onclick="sendMessage()" title="Kirim">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const micBtn = document.getElementById('mic-btn');

        // Fitur Voice
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'id-ID';
            recognition.onstart = () => micBtn.classList.add('active');
            recognition.onresult = (e) => { userInput.value = e.results[0][0].transcript; autoResize(); };
            recognition.onend = () => micBtn.classList.remove('active');
            function startVoice() { recognition.start(); }
        } else { micBtn.style.display = 'none'; }

        function autoResize() {
            userInput.style.height = 'auto';
            userInput.style.height = userInput.scrollHeight + 'px';
        }

        userInput.addEventListener('input', autoResize);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        const starSvg = (isThinking) => `
            <svg class="gemini-star ${isThinking ? 'thinking' : ''}" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2L14.85 8.65L21.5 11.5L14.85 14.35L12 21L9.15 14.35L2.5 11.5L9.15 8.65L12 2Z" />
            </svg>
        `;

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, 'user-message');
            userInput.value = '';
            userInput.style.height = 'auto';

            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message ai-message';
            loadingDiv.innerHTML = starSvg(true) + `<span>Memproses...</span>`;
            chatContainer.appendChild(loadingDiv);
            scrollToBottom();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: text })
                });
                const data = await response.json();
                chatContainer.removeChild(loadingDiv);
                appendMessage(data.text, 'ai-message');
            } catch (error) {
                chatContainer.removeChild(loadingDiv);
                appendMessage("Gagal memproses pesan.", 'ai-message');
            }
        }

        function appendMessage(text, className) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${className}`;
            if (className === 'ai-message') {
                msgDiv.innerHTML = starSvg(false) + `<div>${marked.parse(text)}</div>`;
            } else {
                msgDiv.innerText = text;
            }
            chatContainer.appendChild(msgDiv);
            scrollToBottom();
        }

        function scrollToBottom() {
            chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
        }
    </script>
</body>
        </html>
